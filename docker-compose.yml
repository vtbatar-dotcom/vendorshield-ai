services:
  main-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - RESEARCH_URL=http://research-agent:8001
      - COMPLIANCE_URL=http://compliance-agent:8002
      - FINANCIAL_URL=http://financial-agent:8003
      - RISK_URL=http://main-api:8000
      - MAIN_URL=http://main-api:8000
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./vendorshield.db:/app/vendorshield.db
    depends_on:
      - research-agent
      - compliance-agent
      - financial-agent
      - remediation-agent

  research-agent:
    build:
      context: external-agents/research-agent
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  compliance-agent:
    build:
      context: external-agents/compliance-agent
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8002

  financial-agent:
    build:
      context: external-agents/financial-agent
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8003

  remediation-agent:
    build:
      context: external-agents/remediation-agent
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8004

  intake-agent:
    build:
      context: external-agents/intake-agent
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8005
